<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="128" height="128" rx="28" fill="#0B0F19" />
  <!-- Glowing Base Circle -->
  <circle cx="64" cy="64" r="44" fill="url(#grad)" filter="url(#glow)" />
  <!-- Bold Stylized Letter V -->
  <path d="M44 48 L64 86 L84 48" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
